<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' wss://stream.binance.com https://api.binance.com;">
  <title>Crypto Scanner</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <!-- Navigation Rail -->
    <nav id="sidebar">
      <div class="logo">
        <div class="logo-icon">
          <span class="material-symbols-outlined filled" style="font-size:24px">show_chart</span>
        </div>
        <span class="logo-text">Crypto Scanner</span>
      </div>
      <ul class="nav-links">
        <li data-page="dashboard" class="active">
          <span class="material-symbols-outlined nav-icon">dashboard</span>
          <span class="nav-label">Dashboard</span>
        </li>
        <li data-page="detail">
          <span class="material-symbols-outlined nav-icon">candlestick_chart</span>
          <span class="nav-label">Análise</span>
        </li>
        <li data-page="history">
          <span class="material-symbols-outlined nav-icon">history</span>
          <span class="nav-label">Histórico</span>
        </li>
        <li data-page="settings">
          <span class="material-symbols-outlined nav-icon">settings</span>
          <span class="nav-label">Ajustes</span>
        </li>
      </ul>
      <div class="sidebar-footer">
        <div id="connection-status" class="status-dot connecting"></div>
        <span class="status-text">Conectando</span>
      </div>
    </nav>

    <!-- Main Content -->
    <main id="content">
      <!-- Dashboard -->
      <section id="page-dashboard" class="page active">
        <header class="page-header">
          <h1>Dashboard</h1>
          <div class="header-actions">
            <span id="last-update" class="dim"></span>
            <button id="btn-refresh-all" class="btn btn-primary">
              <span class="material-symbols-outlined" style="font-size:18px">refresh</span>
              Atualizar
            </button>
          </div>
        </header>
        <div id="dashboard-grid" class="pair-grid"></div>
      </section>

      <!-- Detail -->
      <section id="page-detail" class="page">
        <header class="page-header">
          <div class="detail-header-left">
            <button id="btn-back" class="btn btn-ghost">
              <span class="material-symbols-outlined">arrow_back</span>
              Dashboard
            </button>
            <h1 id="detail-symbol">BTC/USDT</h1>
            <span id="detail-price" class="price-large"></span>
            <span id="detail-change" class="change"></span>
          </div>
          <div class="detail-header-right">
            <div id="detail-score" class="score-badge">--</div>
          </div>
        </header>
        <div class="detail-grid">
          <div class="chart-container">
            <div id="chart-timeframe" class="tf-selector">
              <button data-tf="15m">15m</button>
              <button data-tf="1h">1H</button>
              <button data-tf="4h" class="active">4H</button>
              <button data-tf="1d">1D</button>
              <button data-tf="1w">1S</button>
            </div>
            <div id="detail-chart"></div>
          </div>
          <div class="detail-sidebar">
            <div id="detail-breakdown" class="breakdown"></div>
            <div id="detail-levels" class="levels-card"></div>
            <div id="detail-indicators" class="indicators-card"></div>
          </div>
        </div>
      </section>

      <!-- History -->
      <section id="page-history" class="page">
        <header class="page-header">
          <h1>Histórico</h1>
          <div class="header-actions">
            <select id="history-filter" class="select">
              <option value="">Todos os pares</option>
            </select>
          </div>
        </header>
        <div id="history-list" class="history-list"></div>
      </section>

      <!-- Settings -->
      <section id="page-settings" class="page">
        <header class="page-header">
          <h1>Ajustes</h1>
        </header>
        <div class="settings-container">
          <div class="settings-card">
            <h3>
              <span class="material-symbols-outlined" style="font-size:18px">star</span>
              Watchlist
            </h3>
            <p class="dim">Pares monitorados (máx 20)</p>
            <div class="watchlist-editor">
              <div class="input-row">
                <input id="input-add-pair" type="text" placeholder="Ex: BTCUSDT" maxlength="12">
                <button id="btn-add-pair" class="btn btn-primary">
                  <span class="material-symbols-outlined" style="font-size:16px">add</span>
                  Adicionar
                </button>
              </div>
              <ul id="watchlist-items" class="watchlist"></ul>
            </div>
          </div>
          <div class="settings-card">
            <h3>
              <span class="material-symbols-outlined" style="font-size:18px">notifications</span>
              Alertas
            </h3>
            <div class="setting-row">
              <label>Score mínimo para alerta</label>
              <select id="setting-alert-threshold" class="select">
                <option value="75">🟢 75 — Forte</option>
                <option value="60" selected>🟡 60 — Moderado</option>
                <option value="40">⚪ 40 — Neutro</option>
              </select>
            </div>
            <div class="setting-row">
              <label>Intervalo de scan</label>
              <select id="setting-scan-interval" class="select">
                <option value="5">5 minutos</option>
                <option value="15" selected>15 minutos</option>
                <option value="30">30 minutos</option>
                <option value="60">1 hora</option>
              </select>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script>
    // Diagnóstico com retry (evita race condition no startup)
    var diag = document.getElementById('connection-status');
    var diagText = diag.nextElementSibling;

    function checkHealth(retries) {
      retries = retries || 0;
      if (typeof window.api === 'undefined') {
        diag.className = 'status-dot disconnected';
        diagText.textContent = 'preload';
        document.title = 'ERRO: preload';
        return;
      }
      diag.className = 'status-dot connecting';
      diagText.textContent = 'Motor...';
      window.api.health().then(function(h) {
        document.title = 'Crypto Scanner';
        diag.className = 'status-dot connected';
        diagText.textContent = 'Online';
      }).catch(function(e) {
        if (retries < 3) {
          setTimeout(function() { checkHealth(retries + 1); }, 500);
        } else {
          diag.className = 'status-dot disconnected';
          diagText.textContent = 'Offline';
          console.warn('Health check falhou após 3 tentativas:', e.message);
        }
      });
    }
    checkHealth();
  </script>
  <script src="lib/lightweight-charts.standalone.production.js"></script>
  <script src="websocket.js"></script>
  <script src="scanner.js"></script>
  <script src="charts.js"></script>
  <script src="components/dashboard.js"></script>
  <script src="components/detail.js"></script>
  <script src="components/history.js"></script>
  <script src="components/settings.js"></script>
  <script src="app.js"></script>
</body>
</html>
